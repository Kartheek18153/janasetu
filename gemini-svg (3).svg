<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120" width="100%" height="100%">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9933" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#0A2540" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#138808" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Main Background Container -->
  <rect width="1440" height="120" fill="transparent"/>

  <!-- Horizontal Structured Track -->
  <rect y="45" width="1440" height="30" fill="url(#barGrad)"/>
  <line x1="0" y1="45" x2="1440" y2="45" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="0" y1="75" x2="1440" y2="75" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Central Concentric Pillar Rings (No Text, Purely Graphical Accent) -->
  <g transform="translate(720, 60)" opacity="0.8">
    <circle r="35" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <circle r="28" fill="none" stroke="#0A2540" stroke-width="1.5" stroke-dasharray="4,2"/>
    <circle r="18" fill="none" stroke="#FF9933" stroke-width="2"/>
    <circle r="10" fill="#138808"/>
  </g>

  <!-- Left Side Linear Streamers -->
  <g stroke-linecap="round">
    <line x1="100" y1="60" x2="250" y2="60" stroke="#FF9933" stroke-width="3" opacity="0.6"/>
    <circle cx="255" cy="60" r="3" fill="#FF9933" opacity="0.6"/>
    <line x1="300" y1="60" x2="500" y2="60" stroke="#0A2540" stroke-width="1" stroke-dasharray="10,5"/>
  </g>

  <!-- Right Side Linear Streamers -->
  <g stroke-linecap="round">
    <line x1="1190" y1="60" x2="1340" y2="60" stroke="#138808" stroke-width="3" opacity="0.6"/>
    <circle cx="1185" cy="60" r="3" fill="#138808" opacity="0.6"/>
    <line x1="940" y1="60" x2="1140" y2="60" stroke="#0A2540" stroke-width="1" stroke-dasharray="10,5"/>
  </g>
</svg>
