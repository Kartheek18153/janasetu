<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <!-- Outer Card Boundary Mesh -->
  <rect x="10" y="10" width="480" height="330" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Corner Tech Brackets to indicate secure document container scanning -->
  <g stroke="#0A2540" stroke-width="3" fill="none">
    <path d="M 35 50 L 20 50 L 20 65" stroke-linecap="round"/>
    <path d="M 465 50 L 480 50 L 480 65" stroke-linecap="round"/>
    <path d="M 35 300 L 20 300 L 20 285" stroke-linecap="round"/>
    <path d="M 465 300 L 480 300 L 480 285" stroke-linecap="round"/>
  </g>

  <!-- Abstract Matrix Pattern Inside Container Matrix -->
  <g fill="#94a3b8" opacity="0.15">
    <rect x="50" y="90" width="30" height="6" rx="3"/>
    <rect x="95" y="90" width="120" height="6" rx="3"/>
    <rect x="50" y="120" width="180" height="6" rx="3"/>
    <rect x="50" y="150" width="90" height="6" rx="3"/>
    
    <rect x="50" y="210" width="390" height="2" rx="1"/>
    <rect x="50" y="230" width="390" height="2" rx="1"/>
    <rect x="50" y="250" width="240" height="2" rx="1"/>
  </g>

  <!-- Graphical Shield Node Symbolizing Data Security (No fonts) -->
  <g transform="translate(370, 120)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 0 C 30 -10, 45 -10, 45 -10 L 45 25 C 45 55, 0 75, 0 75 C 0 75, -45 55, -45 25 L -45 -10 C -45 -10, -30 -10, 0 0 Z" fill="#f8fafc" stroke="#0A2540" stroke-width="2"/>
    <path d="M -20 20 L -5 35 L 20 10" fill="none" stroke="#138808" stroke-width="3"/>
  </g>
</svg>
